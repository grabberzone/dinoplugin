name: Byg DinoPlugin

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Hent kode
        uses: actions/checkout@v4

      - name: Installer Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Flyt filer til rigtige mapper
        run: |
          mkdir -p src/main/java/dk/dino/dinoplugin
          mkdir -p src/main/resources
          mv DinoCommand.java src/main/java/dk/dino/dinoplugin/
          mv DinoData.java src/main/java/dk/dino/dinoplugin/
          mv DinoListener.java src/main/java/dk/dino/dinoplugin/
          mv DinoManager.java src/main/java/dk/dino/dinoplugin/
          mv DinoPlugin.java src/main/java/dk/dino/dinoplugin/
          mv DinoType.java src/main/java/dk/dino/dinoplugin/
          mv plugin.yml src/main/resources/

      - name: Byg med Maven
        run: mvn package -q

      - name: Upload DinoPlugin.jar
        uses: actions/upload-artifact@v4
        with:
          name: DinoPlugin
          path: target/dinoplugin-1.0.jar
